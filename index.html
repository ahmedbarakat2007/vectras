<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We Have Moved!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 28px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #555;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background-color: #2c3e50;
            color: white;
            border: 2px solid #2c3e50;
        }
        .btn-primary:hover {
            background-color: #1a252f;
            border-color: #1a252f;
        }
        .btn-search {
            background-color: white;
            color: #4285F4;
            border: 2px solid #4285F4;
        }
        .btn-search:hover {
            background-color: #f8fbff;
        }
        .url-highlight {
            color: #2c3e50;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We Have Moved!</h1>
        <p>Our website has a new home. You can now find all our latest updates and services directly at <span class="url-highlight">getvectras.com</span>.</p>
        
        <div class="btn-container">
            
            <a href="https://getvectras.com" class="btn btn-primary">Go to getvectras.com</a>
            
            
        </div>
    </div>
</body>
</html>
